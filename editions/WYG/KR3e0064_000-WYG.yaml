body:
  text: 外科精義醫家類提要臣等謹案外科精義一卷元齊徳之撰徳之始末未詳惟其結銜稱醫學博士充御藥院外科太醫是編先論後方于瘡腫診候淺深虚實最為詳盡考周禮天官瘍醫掌腫瘍潰瘍金傷折傷之祝藥劀殺之齊注曰劀謂刮去膿血殺謂以藥食其惡肉又曰凡療瘍以五毒攻之注曰今醫方有五毒之藥合黄堥置石膽丹砂雄黄磨石慈石其中燒之三日三夜其烟上著以雞羽掃取之以注創惡肉破骨則盡出又曰以五氣養之以五藥療之以五味節之注曰既劀殺而湏盡其宿肉乃飬之也五氣當作五穀字之誤也節節成其藥之力云云是則古者瘍醫攻補兼施之明證後之瘍醫惟持攻毒之方治其外而不治内治其末而不治本故所失恒多徳之此書務審病之所以然而量其隂陽強弱以施療故於瘍科之中最為善本書中無一字及李杲李杲平生亦不以外科著原本附東垣十書之末葢坊刻襍合之本取以備十書之數與所載朱震亨書均為濫入孫一奎赤水元珠引之竟稱東垣外科精義不考甚矣乾隆四十四年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:32e63454c5e8aa7ba1147375716bc05f39ff40e94a894c1a37774920b3aa9ec5
