body:
  text: 外科精義醫家類提要臣等謹案外科精義一卷元齊德之撰德之始末未詳惟其結銜稱醫學博士充御藥院外科太醫是編先論後方于瘡腫診候淺深虛實最為詳盡考周禮天官瘍醫掌腫瘍潰瘍金傷折傷之祝藥劀殺之齊注曰劀謂刮去膿血殺謂以藥食其惡肉又曰凡療瘍以五毒攻之注曰今醫方有五毒之藥合黃堥置石膽丹砂雄黃磨石慈石其中燒之三日三夜其烟上著以雞羽掃取之以注創惡肉破骨則盡出又曰以五氣養之以五藥療之以五味節之注曰既劀殺而須盡其宿肉乃飬之也五氣當作五穀字之誤也節節成其藥之力云云是則古者瘍醫攻補兼施之明證後之瘍醫惟持攻毒之方治其外而不治內治其末而不治本故所失恆多德之此書務審病之所以然而量其隂陽強弱以施療故於瘍科之中最為善本書中無一字及李杲李杲平生亦不以外科著原本附東垣十書之末蓋坊刻雜合之本取以備十書之數與所載朱震亨書均為濫入孫一奎赤水元珠引之竟稱東垣外科精義不考甚矣乾隆四十四年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:9eabf3cbb1e1fe1d06659a383d1882b3576ff9a50cc234f44fddf77c5ad48d4e
