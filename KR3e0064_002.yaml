除根也薰痔散葳靈仙三兩右用水一斗半煎至七八沸去火就盆上坐令氣薰之候通手淋溻冷即再暖通靈丸治耳聾松脂五錢巴豆二十四箇去皮研右先將松脂溶開入巴豆末熬成膏丸如白豆大綿裹一丸塞耳中覺痛取出赤水為效三神丸治僧道痔疾因讀養生必效方見乾義傳僧覺海少年患痔疾其行業比氷霜緣此飽食久坐知痔疾者不必酒色過度矣故素問云因而飽食筋脈橫解腸澼為痔治之故不同也枳殼炒去穰皂角燒存性五倍子已上各等分右為細末煉蜜為丸如梧桐子大每服三二十丸溫水食前服養生必效方中三味皆單用一味為方今增為一方其效如神玉芝飲子治膈熱口舌生瘡咽喉腫痛甘草炙三兩藿香葉石膏水飛山梔子仁已上各一兩右為細末每服一錢新水調下平和飲子出顱腮經中治小兒瘡疹人參白术茯苓甘草升麻已上各等分右為細末每服一二錢水煎去柤溫細細飲之量嵗大小虛實以意詳之此藥治諸瘡疼煩渴不寧者皆可服之惟小兒瘡疹尤佳玄參丸出僧居泰傳治口瘡連年不愈者天門冬去心麥門冬去心玄參已上各等分右為細末煉蜜為丸如彈子大每服一丸噙化犀角散治口舌生瘡咽喉腫痛毒時氣升麻桔梗甘草炙已上各一兩牛蒡子炒四兩右為細末每服三錢水一盞入竹葉五七片煎至七分去柤細細熱飲溫即咽之其柤熱掃項腫上防風散治破傷瘡瘍風邪或身體疼痛風邪攻注攣急及皮膚瘙癢麻木不仁頭昏悶牙關緊欲成破傷風者防風一兩藁本羌活地骨皮荆芥穗已上各五錢右為細末每服三錢溫酒調下烏金散治疳瘻惡瘡麝香蟾酥已上各一字粉霜砂輕粉已上各一錢銅碌砒霜白乾薑草頭烏天南星舶上硫黃已上各五錢右為細末紙撚絍之或湯浸蒸餅和為錠子絍瘡口內上以膏貼之劉守真瘡論素問云痛癢瘡瘍癰腫疽疹瘤氣結核拂鬱甚者皆熱五臟不和九竅不通六腑不和留結為癰近於火氣微熱則癢熱甚則痛附近則灼而為瘡皆火之用也人之瘡腫因內熱外虛所生也為風濕之所乘則生瘡腫然肺主氣候於皮毛脾主肌肉氣虛則膚腠開為風濕所乘脾氣溫而內熱即生瘡也腫者由寒熱毒氣客於經絡使血澀而不通壅結成腫風邪不作即無頭無根寒血相摶作者即有頭有根壅盛則為膿赤根腫則風氣流潰也瘡以痛癢痛則為實癢則為虛非虛為寒也正謂熱之微甚也癢則美疾也故火旺於夏而萬物蕃鮮榮美也灸之以火漬之以湯而其癢轉甚者微熱之所使也癢去者謂熱令皮膚縱緩腠理開通陽氣得泄熱散而去或夏熱皮膚癢而以冷水沃之其癢不去謂寒收斂腠理閉密陽氣鬱結不能散怫熱內作故也瘡瘍皆為火熱而反腐出膿水者猶穀肉果菜熱極則腐爛而潰為汚水也潰而腐爛者水之化也癰淺而大疽深而惡熱勝血則為癰膿也瘍有頭小瘡也疹浮而小癮疹也瘤氣赤瘤丹熛熱勝氣火之色也沒藥膏治一切癰疽發背瘡癤傷折蹊跌壞膿生肌止痛又貼灸瘡極妙麒麟竭明乳香沒藥已上各一分研當歸去蘆木鱉子仁研杏仁已上各五錢油頭髮二兩黃丹六兩右先用油一斤石器內或砂鍋內露天底煉油令熟先下木鱉子當歸杏仁頭髮慢火熬黃焦油耗五分離火用綿濾柤不用再入鍋下黃丹以新柳箆子十條旋換攪不住手候黑色滴在水中成珠子硬軟得所取下火入三味研藥再攪勻磁盒內盛放地上以盆合一宿出火毒用時或帛上或紙上一日一換必效散治久患瘰癧不效服此藥取效如神南鵬砂二錢五分輕粉一錢麝香五分斑貓四十箇去頭翅巴豆五箇去皮心膜白檳榔一箇右同勻極細取雞子清二箇去黃調藥勻却傾在雞子殼內濕紙數重糊定無令透氣坐飯甑內與飯一處蒸飯熟取藥曝乾研極細末用時相度虛實虛人每服半錢實人每服一錢並用炒生薑酒下五更初服藥至平明取下惡物如覺小腹內疼痛便用萆麻子燒灰入沒藥等分同研細用茶調下一錢便入大腸其取下惡物如爛肉老鼠及新成卵內雀兒是效婦人有胎不可服烏金散治癰癤腫硬無頭不變色者米粉四兩蔥白一兩細切右同炒黑色杵為細末每用看多少醋調攤紙上貼病處一伏時換一次消為度抵聖丸治男子婦人頭面手足虛腫苦葶􅏣不拘多少於火上隔紙炒過右杵為細末棗肉為丸如小豆大每服十丸煎麻子湯下食前日進三服五七日小便多腫消為效如喘嗽煎桑白皮湯下忌生冷醋滑物及鹽須另丸一等小丸兒與小兒服看大小加減與服煎棗肉湯下應效散治氣瘻疳瘡多年不愈者地骨皮不以多少冬月自取只要皮隂乾右杵為細末每用紙撚蘸絍瘡口內頻用自然生肉更用米飲調二錢無時日進三服又名托裏散白金散治風攻注毒遍身及手足生熱瘡疼痛有黃水出者桂府滑石右為細末先用虎杖甘草豌豆各等分約半兩許二碗水煎上項三味至一碗去柤微熱淋洗瘡水冷拭乾上摻滑石末令通便睡至明決愈如聖散治渾身瘙癢抓之成瘡及癮疹之類蠶沙一升右用水二斗煎至一斗濾去柤夜卧避風處淋洗水冷即拭乾便睡天蛾散治刀斧傷止血定痛生肌晚蠶蛾不以多少右為細末每用藥貼於瘡口上用綿裹不須再動一上便可必效散治蜘蛛咬著疼痛鹽豉炒乾右為細末每用油調塗之必效蛤粉散治湯火燒燙瘡蛤蠣燒赤放冷右研如粉每用油調塗之日三次治小兒丹瘤木鱉子新者去殼右研如泥淡醋調塗之一日三五次便效治小兒疳口瘡天南星一箇去皮右為末好醋調堆在紙上男左女右貼在腳心底以帛繫定三日外取了以溫水洗盡腳下藥治破傷風并洗頭風藥麻黃一錢去節蝎稍二錢五分蠻薑草頭烏黑附子炮去皮白附子天麻烏稍蛇好酒浸一二夜去骨火上炙黃色川芎已上各五錢右為細末每服一錢熱下日進三五服重者三五日必效此證只宜早治但邪氣入臟則難治治有四死證不可治一頭面青黑色二額上有汗珠不流三眼小目瞪四身上汗出如油烏龍丸治遍身風瘡瘙癢疥癬等疾服之消風散熱利膈化痰唾治肺氣不和此藥推陳致新去腸垢治證甚多要能用度皂角肥者不以多少炙刮去皮弦搗碎甜水揉取濃汁去柤銀石器內熬成膏用黑牽牛不以多少微炒令香熟碾取頭末右將藥末與皂角膏和丸如梧桐子大每服三五十丸氣虛者一二十丸食後溫水送下無病氣人一兩箇月頓一服取利三五行不傷正氣身體輕健肌膚光澤永無痰疹癬之疾紫參丸治熱毒瘰癧腫毒未成者內消已潰者行膿止痛散腫毒麝香另研膩粉已上各三錢紫參苦參已上各一兩丹參一兩五錢連翹一兩滑石二兩五錢右為末别用玄參一斤搗碎以酒三碗浸三日揉取汁去柤用皂角子三百箇煨熟為末用玄參酒熬皂角子末成膏和前藥丸如梧桐子大每服一丸以黃茋湯一日加一丸至患人嵗數即住如四十則二十每日減一丸其瘡自乾已結者內消也服此藥大有神效萬靈丸治背腦疽并一切惡瘡初覺一二日硃砂血竭蓮蘂已上各等分麝香少許右為細末酒糊為丸如黃米大每服七丸溫酒送下瘡在上食後在下食前不過二服即效治眼治昏澀退翳膜川椒四兩去子合者不用甘菊花二兩五錢熟乾地黃二兩酒浸九蒸一碗右為細末煉蜜為丸如梧桐子大每服三十丸食後細嚼新析米十餘粒送下治吹妳方田仲寬方治吹妳及一切惡瘡初覺一二日立效生薑一兩去皮大黃甘草已上各五錢苽蔞一箇去皮右共搗作一塊以水半碗同煎至七分濾去柤入沒藥乳香末共二錢半通作一服治痔瘡雄黃五分細研五靈脂去石燒過斷煙五倍子炮過已上各一錢沒藥二錢五分明淨者白礬半飛半生右為細末研令極細用紙花子貼瘡口上洗痔防風當歸川芎已上各等分右三味銼細煎水去柤令熱溫淋洗瘡用軟帛印乾傅前藥寸金丹二名返魂丹三名再生丸四名追命丹五名延壽丸六名來蘇丸七名知命丸八名得道丸非人勿示此方若有人患瘡身未爛者與三丸服之咽下便活如口噤但斡開牙關研下三丸灌下喉中立生此方治發背腦疽癰腫遍身附骨腫痛先覺時飲水口中煩渴發熱四肢沈重體壯熱麝香一分南乳香烏金石輕粉雄黃狗寶沒藥已上各一錢蟾酥二錢粉霜黃蠟已上各三錢砂五錢鯉魚膽乾用狗膽已上各一箇乾用金頭蜈蚣七條全者酥炙黃色頭首兒孩兒乳一合右件為末除黃蠟乳汁二味熬成膏子同和丸如菉豆大小兒丸如芥子大每服一丸病重者加三丸白丁香七箇研爛新汲水調送下用衣服蓋之睡勿令透風汗出為度大段疼痛如無頭瘡腫不過三服立效服藥後喫白粥苽虀就服大妙牙疳藥此藥是京兆惠民局見行經驗方治大人小兒揀信青黛輕粉已上各一錢麝香五分右同為細末用小油調薄攤紙上用木槌鎚實收起每用臨卧以漿水洗淨印乾可瘡口大小以藥紙封之至曉去藥紙潄淨勿令咽下大者不過三上必效回瘡蟾酥錠子陜西醫局提舉馬雲卿親傳經驗方治丁瘡毒氣攻心欲死以針刺其瘡向心行處但覺痛有血處下錠子若纍刺至心側近皆不痛無血者急針百會穴痛有血者下錠子若無血以親人熱血代之猶活三四况瘡初發無有不效大抵丁瘡生於四肢及胸背頭項骨節間唯胸背頭項最急初生痛癢不常中陷如丁蓋撼之有根壯熱惡心是也天南星款冬花巴豆仁黃丹白信已上各一錢獨活五分斑貓去頭足十箇右為極細末用新蟾酥和藥如黍米大撚作錠子每遇丁瘡先以針刺其瘡必不知痛有血出者下錠子如覺痛不須再用若更不知痛再隨瘡所行處迎奪刺之至有血知痛即止其元瘡亦覺疼痛以膏藥傅之膿出自差用錠子法度以銀作細筒子一箇約長三寸許隨針下至瘡痛處復以細銀絲子內藥於筒內推至痛處乳香托裏散同前所傳治一切瘡腫疼痛不可忍如少壯氣實者先疏利後服之大效御米殼去膈蒂萼蜜炒三兩當歸芍藥川芎已上各五錢乳香沒藥已上各一錢右為粗末每服五錢水一盞半煎至七分去柤溫服病在上者食後在下者食前若未止即再服四聖旋丁散治丁瘡生於四肢其勢微者先以好醋調藥塗上以紙封之次服內托裏之藥其丁自旋出根巴豆仁五兩白殭蠶輕粉砂已上各二錢五分右為細末醋調用之天丁散同前祕傳經訣治一切丁瘡及諸惡瘡初生以藥塗之急服托裏內消山丹花蘂香白芷已上各五錢牛蒡根春採去皮天丁乃皂角刺蒼耳芽大力子已上各五錢雄黃一兩右五月五日受氣修合為細末每用好醋塗紙封之丁瘡上有黑甲者必須胡桃油浸次塗之自可萬應膏同前所傳治一切瘡瘍初生腫焮甚者無問大小以膏可腫痕貼之煎蔥白水熱淋兩炊時良久再淋腫消為度如瘡老不能差者亦收斂聚膿決然早差黃蘖芍藥白芷黃茋木鱉仁杏仁當歸白芨生地黃官桂玄參去皮銼碎沒藥乳香已上各五錢研白蘞黃蠟已上各一兩黃芩大黃已上各二兩黃丹一斤芝麻油二斤八兩右件十四味入油內浸一宿絶早入砂鍋慢火熬用生柳條攪至申時以焦褐色出火去粗柤又以重綿濾過入丹再熬旋滴水中成珠不散者出火絶煙入乳香沒藥黃蠟攪勻用磁器收貯於土內埋七日取出攤用治小兒面湮瘡俗云鍊鍛瘡者是母受胎之日食酸辣及邪味過度多生此瘡百藥煎五錢生白礬一錢右為細末小油調旋搽之神效治赤白口瘡大人飢渴不時小兒失驚即生口瘡生白礬一錢右噙潄之從瀝頑涎立效治乾濕疥癬此是肺受邪毒運於四肢久而不散以生內蠧硫黃一兩生白礬八錢右為細末油調火灸抓破塗之立效治湯火燒燙無問新舊青槐枝一兩銼碎菉豆粉一兩炒黃色輕粉一錢右同為細末油調塗之止痛滅毒治破傷風手足顫掉不已者硃砂另研南星薑製獨活去皮已上各二錢人手足指甲燒絶煙六錢右為細末分作三服酒調服之立效治破傷無問新舊石灰右用一味驗瘡口大小儘乾塗之不須封裹神效治風狗咬破傷風此病非為小可乃九死一生之病可急用好斑貓七箇去翅足右為細末酒調服之於小便盆內見衣沫似狗形者為效如無再服七次雖無狗形亦不再發也此方纍試經驗今附於此論炮製諸藥及單方主療瘡腫法夫藥者治病之物蓋流變在乎病主治在乎藥製用在乎人三者不可闕一也凡用一味炮炙修製及單方主療該引方書出處不必隨方標寫硃砂須研細水飛濾乾若入膏中者待熬膏成稍凝冷即下急攪勿令沈聚大凡石類一一如此雲母即須用鍊成熟粉曽經婦人手拈者不效聖惠方治湯火瘡羊髓和膏塗之神良千金方如治金瘡及諸惡瘡依上塗傅大效礬石即白礬凡用須木炭火上枯汁盡主隂蝕惡瘡去鼻中瘜肉生􅍭咽津治急喉閉肘後方治耳中卒腫痛或有膿水者以筒吹一字於耳中以綿塞之立效又治諸毒蟲惡獸咬傷傅之則差千金方以醋煮湯潰蝎螫立差王氏博濟治驢馬汗毒傷人瘡腫痛和黃丹傅之靈苑方治傷折瘡腫以沸湯投枯礬漬浴之御醫院方治隂汗以枯礬投沸湯中浴之水銀主疥瘻痂傷白秃入膏令膏冷凝下之攪令分散如星勿令沈聚水銀粉即輕粉主瘰癧殺疥癬蟲酒齄風以羊髓和如膏塗及貼膁瘡一上可石灰主疥癬骨疽金瘡風化者良外臺祕要方治風疹以漿水調熱掃之隨手差孫真人治疥淋石灰水溫洗之千年者尤佳白麥飯石即粗理黃石曾磨刀者佳凡用須釅醋淬之今屑落醋中者良亦單用治發背神良本草曰大凡石類多主癰疽花蘂石主金瘡止血合硫黃木炭火炒良或只刮花蘂石末效黃茋主癰疽久敗瘡排膿止痛兼五痔鼠瘻止渴聖惠千金外臺祕要方治發背腦疽托裏止渴用黃茋六兩甘草一兩銼細水煎溫服無時大效葈耳即蒼耳千金翼方丁腫用根莖葉炒灰存性為末醋泔淀和如泥塗之一日二易之三日腫消根丁自拔出亦治諸腫掃之尋差麻黃凡用根節煮三沸掠去沫晒乾銼黃芩凡用去腐蘆揀細實者佳梅師方治諸丹作末水調掃之亦治湯火瘡烏頭附子凡用須炮裂去皮臍半夏凡用湯泡七次去滑羊蹄根主乾癬疥頭秃取根囓塗之效簡要濟衆方治癬瘡久不差取新者絞汁和膩粉如膏塗之千金聖惠外臺等方皆治癬和醋或白礬或硫黃塗之皆愈狼毒主癰疽惡瘡鼠瘻聖惠方治癬瘡積年搔之黃汁出癢痛以末傅之或豬膏和塗差芭蕉根主瘡腫搗根汁塗之良百一方治發背根汁塗之土青木香即馬兜苓根主頭風搔癢秃瘡連翹主寒熱鼠瘻癰疽惡瘡癭瘤同甘草服食蒲公草主乳癰煮汁飲之自消梅師方傅之亦消滑石本草不言療瘡腫本體較治諸瘡久不愈消熱毒腫及金瘡血不止湯火炒瘡用之尤良白石英主肺癰吐膿咳嗽胸膈上風熱痰肺瘻消渴隂瘻補五臟赤石脂治瘡疽痔瘻瀉痢加芎末等分粥飲調服一錢重神效寒者加乾薑服白石脂治癰疽排膿生肌新生兒臍濕雄黃主寒熱鼠瘻惡瘡疽痔死肌疥癬硫黃主女人隂蝕疽痔惡瘡疥癬殺蟲雌黃主惡痂疥頭秃下部􅉶瘡殺蟲磁石消癰腫主鼠瘻頸核喉痛蜜陀僧主金瘡止血口瘡疳瘻面上瘢皯伏龍肝摻主惡瘡水調掃丹腫酒調封發背令內消礜石主寒熱鼠瘻惡瘡蝕死肌薑石搗末雞子清調敷丁腫丹瘤乳癰粗理黃石或作碓碾者即磨刀粗石齊馬嗣明治揚遵彥發背取此石猛火煅赤投釅醋中因有屑落取為末醋熬如糊厚塗立愈大凡石頭多主癰疽爐甘石主愈瘡止血治目赤瘡燈心主破傷血出每用貼破上封之立差槐根皮主痔及白皮煎湯薰浴良入荆芥尤妙地骨皮主疽瘡經年以粗皮煎湯洗之細沫白穰别碾摻之即差黃蘖主瘡腫神良每用去粗皮塗蜜炙銼諸方用作湯漬隂瘡良搗末蜜水調敷腫枳殼凡用須麩炒去穰銼枳實亦同厚朴凡用須去粗皮生薑塗製炙後焦銼皂角凡用須不蚛者去黑皮弦子酥炙黃色銼木鱉子凡用去殼主惡瘡毒腫孫用和方治痔用仁三五枚研如泥以沸湯浸用汁先薰但通手即浴洗日三度楸樹白皮單用熬膏貼癰疽惡瘡疳瘻痔疾用其白馬牙燒灰治發背初生用摻瘡頭上以膏封之兔頭連皮骨臘月細銼瓶中封之百日塗發腦疽發背惡瘡出百一方兔腹下白毛治湯火瘡已破者先用膠水掃之後用兔白毛貼之毛落平復勝金方治痔用玩月砂即兔糞也和乳香末酒調三錢溫服日三服即差蜜凡煉須煎令沸掠去沫外臺治隂頭生瘡以蜜煎甘草末塗之神效肘後方單用塗湯火瘡牡蠣凡用木炭灰炒通赤濕地上放經宿方用經驗方治瘰癧用牡蠣四兩玄參三兩為末糊丸如梧桐子大酒服三五十丸食後服藥盡患亦除根集驗方治一切癰腫水調牡蠣粉掃之乾即再掃即消名拔毒散初虞世治瘰癧用和甘草末茶調三錢服之神效大驗蛇退皮諸方用治丁雜惡瘡十年不差者全用炒存性豬膏和塗之其驗神效蜘蛛聖惠治瘰癧不問新舊或成瘻者晒乾為末酥和如糊貼之日三度大效千金治發背瘡亦治鼠瘻神良談氏治贅瘤疣目以網絲作線際根繫之一宿自落蜣蜋聖惠治一切惡瘡端午日收乾為末者油調敷之神效子母祕録治忽得惡瘡未辨識者取新者絞汁傅其上大效古今諸方治丁瘡欲死者取蜣蜋心腹下度取之稍白者是以針刺丁瘡當心及四畔以心塗貼之百苦立已經宿其丁自拔出大忌食羊肉多不效陳橘皮凡用溫水浸去白青橘皮亦然枇杷葉主嘔逆下氣凡用去毛刺甘草湯洗三葉重一兩者桃杏仁凡用須湯浸去皮尖雙仁炒銼或研無心草凡用去蘆苖煎洗甲瘭疽神效防風凡用去義蘆藜蘆凡用去苖犀角凡用生不曽見火者即鎊錯為末茯苓凡用去粗皮白者佳芍藥亦用白者佳牽牛子凡用黑成熟者微炒假如一斤取頭末四兩外科精義卷下
