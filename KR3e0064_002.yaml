  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0064_WYG_002-1a, image: WYG0746/WYG0746-0826a.png}
body:
  text: 外科精義卷下元齊德之撰漏蘆湯治一切惡瘡毒腫丹瘤瘰癧丁腫魚睛五發廪疽初覺一二日便如傷寒頭痛煩渴拘急惡寒肢體疼痛四肢沈重恍惚悶亂坐卧不寧皮膚壯熱大便祕澀小便赤黃並宜服之妊身莫服漏蘆白蘝黃芩去黑心麻黃去節升麻芍藥甘草炙􅮄硝已上各一兩大黃二兩枳實右除硝外餘㕮咀與硝同和勻每服三錢氣實人五錢水一盞半文武火煎七沸去柤空心熱服化毒丹治百種惡瘡毒腫初覺一二日咳逆煩悶或咽喉閉塞發熱惡寒沒藥乳香已上各五錢另研草頭烏醋浸炮製浮石已上各一兩燒赤醋滓七次研餘醋另研巴豆四十九筒去皮生用另研右五味為細末用浮石烏頭餘醋打麵糊為丸如豌豆大每服五七凡食後冷酒送下忌熱飲取快利三二行或吐出惡為效內消丸治瘡腫初生及瘰癧結核熱毒鬱滯服之內消矣大效青皮陳皮已上各二兩牽牛八兩取頭末二兩薄荷葉皂角已上各八兩不利者取粗皮槌碎二味水一斗煮令極軟搗汁去柤用熬成膏右將青皮陳皮末并牽牛末和勻用前膏子和丸如菉豆大每服三十丸食後荆芥茶清溫水皆可下五利大黃湯治人年四十已前氣血盛多若患瘡疽大小便祕者大黃根黃芩去腐升麻已上各二兩芒硝梔子已上各二兩二錢右㕮咀每服五錢水一盞半煎五七沸去柤空心稍熱服內消升麻湯治證同前大黃升麻當歸黃芩去腐枳實炒去穰芍藥已上各二兩五錢甘草炙一兩五錢右㕮咀每服五錢水一盞半煎至七分去柤食前稍熱服五香連翹湯如不用五香曰七味連翹湯治證同前沈香藿香葉木香丁香已上各一兩麝香一字五味為粗末另研連翹射干獨活升麻甘草寄生草已上各一兩大黃一兩五錢右七味㕮咀與前五味和勻每服五錢水一盞半煎至一盞去柤溫服取利為效未利則再服食前牡蠣大黃湯治證同前牡蠣木香大黃煨已上各等分右㕮咀每服三錢水一盞半煎至七分春夏露溻一宿於雞鳴時空心服之冬月於暖處放一宿婦人重身者勿服此藥決利三兩行便勿服已上五方對證選用和血通氣丸治證同前人參一兩麥門冬去心二兩大黃黃芩去腐黃連已上各四兩牽牛一斤炒香取頭末四兩右六味為細末煉蜜和丸如豌豆大每服二三十丸食後溫水送下尋常積熱之人隔三二日服此藥微利潤動永不生瘡腫如已早覺者服之亦得內消矣地黃煎丸治臟腑有熱胸膈痰實血氣不和經絡祕澀多生瘡腫已患惡瘡毒腫大小便結澀生地黃新者十兩洗水浸研如泥黃連五兩黃芩去腐三兩枳殼炒去穰大黃已上各二兩五錢人參二兩右除地黃煎外並為細末再和地黃煎和搗入煉蜜丸如豌豆大每服五七十丸食後溫水下素有熱之人日服百餘丸不發瘡瘍年髙氣弱之人亦宜常服清利胸膈明目槐角煎丸治瘡瘍瘰癧疥癬赤腫等瘡天麻川芎甘草黃藥子甘菊花人參已上各一兩何首烏苦參已上各一兩五錢荆芥穗防風已上各二兩槐角并仁另放皂角不時者已上各四兩水一斗煮軟揉汁去柤取仁熬成膏子其皂角取肉研入膏子為用右除皂角膏外槐仁與諸藥為細末入膏內溲和煉蜜為丸如豌豆大每服五十丸食後竹葉湯下皂角煎丸治風毒瘰癧皂角不蛀者三十錠炮黑干錠酥炙十錠用水一斗煮汁為度何首烏玄參薄荷葉已上各四兩右為細末與前膏子同煉蜜為丸如豌豆大每服三四十丸食後溫水送下苦參散出野人多效方治遍身瘡疥經年不效苦參蔓荆子何首烏荆芥穗葳靈仙已上各等分右為細末每服二錢食前酒調下日進三服忌發風物苦參丸治證同前山梔子仁苦參防風玄參獨活枳實甘菊花黃連去鬚黃芩大黃各等分右為細末煉蜜為丸如豌豆大每服五十丸茶酒任下食後服肺風丸今體治世方治面鼻風􅖟及皶􅀈細辛旋覆花羌活已上各一兩晚蠶蛾去翅足苦參已上各二兩右為細末軟飯和丸如梧桐子大每服五十丸茶酒任下不拘時連翹散治瘡瘍癤腫一切惡瘡疼痛煩渴大便溏泄虛熱不寧連翹山梔子甘草防風已上各等分右為粗末每服二錢水一盞煎至七分去柤溫服不拘時候竹葉黃茋湯出總録一百三十一治諸癰疽發背煩渴及一切惡瘡發大渴者淡竹葉二兩黃茋當歸川芎甘草黃芩去心芍藥人參麥門冬去心半夏湯泡石膏已上各三兩生地黃八兩右為粗末每服五錢水一盞半竹葉五片生薑五片煎至一盞去柤溫服枳殼丸出總録治瘡疳熱癰腫瘰癧枳殼麩炒去穰牽牛炒取頭末木香青皮已上各一兩甘草大黃右為細末用皂角長一尺許者三枚約三兩炮焦槌碎以好酒煮軟挼取汁熬膏稠粘和前藥末為丸如梧桐子大每服三五十丸食後蔥茶下日進二服五香湯出總録治諸瘡毒氣入腹托裏丁香木香沈香乳香已上各一兩麝香三錢嘔者去麝加藿香渴加人參已上各一兩右為細末每服三錢水一盞煎至六分去柤空心稍熱服總録聖惠千金外臺治諸瘡腫方中皆載此方大同小異大抵專治毒氣入腹煩悶氣不通者其餘熱渴昏昧口燥咽乾大便硬小便澀者未可興服托裏黃茋湯出總録治諸瘡潰後膿多內虛茯苓去皮人參官桂去白逺志去心麥門冬去心五味子炮黃茋當歸已上各等分右為粗末每服五錢水一盞半煎至一盞去柤溫服食前托裏茯苓湯防風桔梗芍藥五味子川芎甘草麥門冬去心桂去皮熟地黃已上各一兩黃茋茯苓已上各一兩五錢右為末每服五錢水一盞半煎至一盞去柤溫服托裏當歸湯大醫瘡科何氏五方當歸黃茋人參熟地黃川芎芍藥甘草炙柴胡已上各等分右為粗末每服五錢水一盞煎至六分去柤食前溫服托裏散出太醫瘡科成子玉方川烏頭炮茯苓已上各三兩乾薑炮麻黃去節甘草炙已上各一兩五錢杏仁炒去皮尖五味子桂心已上各一兩右為粗末每服五六錢水一盞半煎至一盞去柤食前溫服托裏玄參散出總録主托裏止渴解熱煩渴玄參人參甘草炙甘菊花右為細末每服三錢菉豆湯調下亦名內托散內托散洪氏方有芍藥總録無芍藥亦名生肉芎藭炒治癰疽潰後內虛者或氣弱人初覺生瘡瘍亦可服內消宜詳細用之當歸芎藭黃茋厚朴去皮桔梗防風甘草炙官桂去皮人參白芷芍藥已上各一兩右為細末每服三錢溫酒調下或木香湯亦可內補散聖惠六十一總録二百一十八無川芎黃茋麥門冬去心川芎當歸茯苓去皮人參五味子已上各一兩逺志去心甘草炙桂心已上各五錢右㕮咀每服五錢水一盞半生薑三片棗三枚煎八分溫服無時內塞散總惠一百二十三萬全方中去附子治疳瘻不差諸瘡附子二箇炮官桂去皮赤小豆甘草黃茋當歸茯苓防風白芷桔梗川芎人參逺志去心厚朴已上各一兩右為末每服二錢溫酒調下空心日進二服香粉散主托裏止痛解煩渴退虛熱真菉豆粉三兩南乳香一兩右為細末每服三錢新水調下止痛當歸湯出總録一百三十治腦疽發背穿潰疼痛當歸黃茋人參官桂芍藥甘草炙生地黃已上各一兩右為粗末每服五錢水二盞半煎至一盞去柤溫服日進三服黃茋茯苓湯出總録一百三十治諸瘡潰後托裏除虛熱黃茋白茯苓官桂去皮麥門冬五味子川芎已上各一兩右為粗末每服五錢生薑三片棗一枚水一盞半煎至一盞去柤溫服食前日進三服內補防風散附子二箇炮去皮防風茯苓白芷桔梗川芎當歸人參甘草炙逺志官桂去皮黃茋已上各一兩厚朴二兩生薑汁製赤小豆半升酒浸一宿右為細末每服三錢溫酒調下伏梁丸出養生必用方治環臍腫痛腸胃瘡疽厚朴生薑汁製茯苓枳殼麩炒去穰白术京三稜炮半夏湯洗七次人參已上各一兩右為細末麵糊為丸如小豆大每服二十丸食前米飲湯下溫經丸出前方治陷脈瘻厚朴生薑汁製官桂去皮白术甘草炙乾薑炮木香已上各一兩附子二兩醋浸炮淬一天去皮臍右為細末煉蜜和丸如梧桐子大每服三十丸食後飲湯下木香溻腫湯治諸瘡疽始發腫焮增長熱痛木香犀角大黃梔子仁升麻黃芩黃連射干黃蘖白蘝甘草炙􅮄硝紫檀羚羊角已上各一兩右㕮咀入生地黃汁五合如無只用生乾地黃五兩銼碎和勻每用藥五兩水一斗煎至七升入麝香五錢淨帛蘸藥熱溻腫上日兩三度冷即再換升麻溻腫湯升麻黃茋防風川芎生地黃細辛已上各等分右㕮咀用藥二兩水三升煎十沸稍熱淋內消如神豬蹄湯出聖惠方升麻甘草芍藥蒴藋已上各等分右㕮咀每用藥四兩水一斗豬蹄一對煮蹄軟取出次下藥再煎十沸帛蘸淋溻之甘草大豆湯出聖惠方治外隂蝕下疳痷瘡腫病甘草三兩赤皮蔥三莖大豆一合右用水三升煮豆熟為度用槐條一握同煮取清汁熱淋浴冷即再溫浸三二時為度大效溻腫湯芍藥黃芩去黑心丹參白蘝已上各等分右㕮咀用藥五錢水一升煎十沸帛蘸頻溻之洗毒湯苦參防風甘草炙露蜂房已上各等分右㕮咀水煮濃汁洗瘡腫浴毒湯出拾遺衛生方治小腸風隂瘡癢痛木通藁本枳殼管仲白芷荆芥甘松薄荷已上各等分右㕮咀用藥二兩水五升入芒硝半兩煎至三升熱洗浴瘡何首烏散出祕寶生方治遍身瘡腫癢痛防風苦參何首烏薄荷已上各等分右為粗末每用藥半兩水酒各一半共用一斗六升煎十沸熱洗便於避風處睡一覺其痛甚者二日全愈八仙散出衛生方治遊風腫癢疥癬瘡或因洗頭遊風瘙癢生痛細辛荆芥白芷川芎防風黃芩甘草地骨皮已上各等分右為粗末每用藥二兩水二碗煎十沸去柤熱淋溻患處消毒湯治百雜瘡腫悉能內消獨活防風細辛藁本川芎枸杞子荆芥漏蘆大黃黃芩去腐官桂苦參葳靈仙丹參黃茋當歸芍藥茯苓黃連無心草黃蘖麻黃葛根蒴藋菊花杜仲地骨皮秦皮􅞒草甘草甘松藿香白芷露蜂房升麻零陵香已上各一兩蒼术三兩􅮄硝五兩菖蒲八兩右為粗末每用藥半兩水二升蔥三莖槐柳枝各一握同煎十餘沸去柤熱淋洗浴此藥用之如神尉風散出玉子手中箱集羌活防風白芷當歸芍藥細辛芫花吳茱萸官桂已上各等分右為粗末作二劑赤皮蔥連鬚細切半斤同釅醋拌勻炒令極熱帛裹於瘡上尉之稍冷即換藥尉之上下痛止而已應痛丸治走注疼痛疑是附骨疽者蒼术去皮當歸草烏頭炮黑牽牛已上各一兩右為細末用醋糊為丸如小豆大每服三十丸空心醋湯送下黃茋丸治腎臟風虛攻注手足頭面麻痺痛癢或生疥癬腫焮黃茋烏藥茴香炒地龍去土川椒去防風川梀子炒赤小豆白蒺藜去刺海桐皮葳靈仙陳皮已上各等分右為細末酒糊為丸如梧桐子大每服三十丸空心溫酒送下梔子仁湯出普濟生靈方治時氣頭面赤腫鬱金枳殼去穰升麻梔子仁牛蒡子大黃已上各一兩右為細末每服三錢蜜水調下葛根牛蒡子湯治時毒大頭病是也葛根管仲甘草鹽䜴牛蒡子各一兩右為細末每服三錢用水調下此疾近代患者傳染多致夭枉治之者少得方法只云太熱必然殊不知亦有虛實表裏治之者詳其汗下吐不同大抵與傷寒頗類其中亦有可針鎌砭射出血者亦有久而敗爛出膿者其間變異百端不可不慎所宜時疾也通氣散治時氣頭面赤腫或咽喉閉塞不通用之取嚏噴七八遍泄出其毒則差若看病之人用此藥必不傳染玄胡一兩五錢豬牙皂角川芎已上各一兩藜蘆五錢躑躅花二錢五分右為細末每用紙撚子蘸一米許絍於鼻中取嚏為效白丁香散治婦人吹妳初覺身熱頭痛寒熱及胸乳腫硬是其候也服之能令下其乳汁通其血脈立能自消矣白丁香真者右為細末每服二錢酒調服腫硬立消甚者不過三服金銀花散治發背惡瘡托裏止痛排膿金銀四兩無花用苗葉