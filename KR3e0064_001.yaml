body:
  text: 外科精義卷上元齊德之撰論瘡腫診候入式法夫醫者人之司命也脈者醫之大業也蓋醫家茍不明脈則如冥行索途動致顛覆矣夫大方脈婦人小兒風科必先診脈後對證處藥獨瘡科之流多有不診其脈候專攻治外或有證候疑難别召方脈診察於瘡科之輩甘當淺陋之名噫其小哉如是原夫瘡腫之生皆由隂陽不和血氣凝滯若不診候何以知隂陽勇怯血氣聚散耶由是觀之則須信療瘡腫於診候之道不可闕也歷觀古今治療瘡腫方書甚多其間診候之法略而未詳比夫諸科甚有滅裂愚雖不才輒取黃帝素問難經靈樞甲乙及叔和仲景扁鵲華陀千金外臺聖惠總録古今名醫諸家方論之中診候瘡腫之說簡編類次貫成篇帙首載診候入式之法次論血氣色脈參應之源後明脈之名狀所主證候及瘡腫逆從之方庶使為瘡腫科者覽此則判然可曉了無凝滯於胸次一朝臨疾診候至此則察逆從次成敗若黑白之易分耳論榮衛色脈參應之法夫天地之道曰隂與陽隂陽在人曰血與氣蓋血者榮也氣者衛也榮者榮於中衛者衛於外所以榮行脈中衛行脈外脈者血氣之先也血非脈則焉能榮於中氣非脈則焉能衛於外二者相資而行內則通於五臟六腑十二經絡外則濡於九竅四肢百節萬毛晝夜循行如環無端以成其度㑹於寸口變見於脈故曰氣血者人之神也脈者氣血之神也所以治病之始五決為紀蓋五決者五臟之色脈也脈應於內色應於外其色之與脈常相參應故曰能合色脈可以萬全也凡為醫先須調明色脈况為瘡科於此不精雖聰惠辨博亦不足委也論持手訣消息法夫診候之脈法常以平旦為紀隂氣未散陽氣未動飲食未進氣血未亂經脈未隆絡脈調勻故乃可診有疾之脈若遇倉卒病患不拘此論內經所謂持脈有道以虛靜為保但可澄神靜慮調息凝心視精明察五色聽音聲問所苦方始按寸尺别浮沈以此參照決死生之分矣復觀患人身形長短肥瘦老少男女性情緩急例各不同故曰形氣相得者生三五不調者病謂如室女尼冠脈當濡而弱嬰兒孺子之脈細而疾三四嵗者呼吸之間脈當七八至為平比夫常人特不同耳大抵男子先診左手女子先診右手男子左脈大則順女子右脈大則順大凡診脈先以中指揣按掌後髙骨骨下為關得其關位然後齊下兩左右二指若臂長人疏排其指若臂短人密排其指三指停穩先診上指曰寸口浮按消息之中按消息之重按消息之上竟消息之下竟消息之推而外之消息之推而內之消息之然後先關後尺消息一一類此若診得三部之中浮沈滑澀遲疾不調何病所主外觀形色內察脈候參詳處治以忠告之不可輕言談笑亂說是非左右瞻望舉止忽略此醫之庸下也論三部所主臟腑病證夫診候之道醫者之難精也若非燈下苦辛勤於記誦參師訪友晝夜不遑造次顛沛寤寐俯仰存心於此安能知神聖之妙哉古人曰按其脈知其疾命曰神以悟其探賾索隱之妙也又曰切其脈治其病謂之巧以明其指别之功也蓋三指相去毫釐之近主病若千里之逺觀夫指别之功世人固以為難命曰神豈容易可至哉常者於經脈有三部寸關尺也從魚際至髙却行一寸曰寸從寸上一分曰魚際從寸至尺曰尺澤寸後尺前為關關前為陽即寸口也關後為隂即尺脈也陽出隂入以關為界寸主上焦頭手皮毛關主中焦腹及腰尺主下焦小腹及足此三部所主大略也又有左右兩手三部為之六脈也又有人迎氣口神門所主又各不同蓋左手關前曰人迎右手關前曰氣口兩關之後一分即曰神門故脈法讚曰肝心出左肺脾出右腎為命門俱出尺部魂魄穀神皆見寸口所謂左手關前心之部也其經手少隂與手太陽為表裏小腸合為府左手關上肝之部也其經足厥隂與足少陽為表裏膽合為府左手關後腎之部也其經足少隂與足太陽為表裏膀胱合為府右手關前肺之部也其經手太隂與手陽明為表裏大腸合為府右手關上脾之部也其經足太隂與足陽明為表裏胃合為府右手關後命門之部也其經手厥隂與手少陽為表裏三焦合為府此謂六部所主臟腑十二經之義也又脈要精微論曰尺內兩旁則季脅也尺外以候腎尺裏以候腹中附上左外以候肝內以候膈右外以候胃內以候脾上附上右外以候肺內以候胸中左外以候心內以侯亶中前以候前後以候後上竟上者胸喉中事也下竟下者小腹腰股膝脛足中事也粗大者隂不足陽有餘為熱中也來疾去徐上實下虛為厥顛疾來徐去疾上虛下實為惡風也故中風者陽氣受也有脈俱沈細數者少隂厥也沈細數散者寒熱也浮而散者為眩仆諸浮不躁者皆在陽為熱其有躁者在乎陰諸細而沈者皆在隂則為骨痛其有靜者在足數動一代者病在陽之脈也泄及便膿血諸過者切之澀者陽氣有餘也滑者隂氣有餘也陽氣有餘為身熱無汗隂氣有餘為多汗身寒隂陽有餘則無汗身寒推而外之內而不外者有心腹積也推而內之外而不內者身有熱也推而上之上而不下者腰足清也推而下之下而不上者頭項痛也按之至骨脈氣少者腰脊痛而身有痺也已上諸疾若非指明心了烏可得而妙也又平人氣象論曰一呼脈再動一吸脈亦再動呼吸定息脈行五動為一大息不大不小不長不短不滑不澀不浮不沈不遲不數命曰平人平人者不病也蓋平人之常氣禀乎胃胃氣者平人之常氣也所以人常禀氣於胃故脈以胃氣為本也正理論曰穀入於胃脈道乃行合靈樞經云胃為水穀之海也又曰脈應四時曰平信夫四時之脈皆以胃氣為本謂春弦夏洪秋毛冬石春之胃脈微弦曰平餘皆倣此逆四時有病矣若診婦人之脈妊身則慎勿亂投湯散其婦人之脈診得少隂脈動甚則有子也又曰隂摶别陽為有子也又曰身汗而無脈者即有妊也蓋重身者問其月事觀其體貌然後主治不可忽也又經曰察色按脈先别隂陽蓋隂陽者天地之道也是以治病者必求其本本於隂陽寒暑四時五臟之根也以脈言之則浮沈也以部言之則尺寸也故經云脈者隂陽之法以應五臟是謂呼出心與肺吸入腎與肝呼吸之間脾受穀味其脈在中也以浮沈論之則曰浮者陽也沈者陰也應在臟腑則浮而大散者心也浮而短澀者肺也所以心肺俱浮也牢而長者肝也按之而大舉指來實者腎也所以肝腎俱沈也遲緩而長者脾也脾為中州所以脈在中也仲景曰大浮數動滑皆陽也沈澀弱弦微皆隂也陽者熱也隂者寒也所以寒則脈來沈而遲熱則脈來浮而數故曰諸數為熱諸遲為寒無如此驗也脈經曰諸浮為風諸緊為痛諸伏為聚諸弦為飲芤者失血長則氣治短則氣病澀則煩心大則病進浮為在表沈為在裏遲為在臟數為在腑又形壯脈細少氣不足以息者危形瘦脈大胸中氣多者斃形氣相得者生三五不調者病三部九候皆相失者死此先聖診脈之大法也故曰凡治病則察其形氣色澤治之無候其時也所以形氣相得者生色澤以浮者病易已脈從四時者可治脈弱似滑者是有胃氣此皆易治也若形氣相失或色夭不澤及脈逆四時或脈實益堅皆不可治經所謂必察四難而明告之又若病熱脈靜泄而脈大脫血脈實汗後脈躁此皆難治也若瘡疽之人膿血大泄脈滑數者難治也凡瘻膿多或如清泔脈滑大散寒熱發渴者治之無功也若患肺瘡者咳嗽膿血脈見洪滑治之難痊矣大凡診脈見浮數應當發熱而反惡寒雖頭項拘急四肢煩痛或復戰栗渴甚者但有痛處欲發瘡腫也論脈證名狀二十六種所主病證夫脈之大體二十六種此診脈之紀綱也細而論之毫釐少差舉治必逺總而言之逆從虛實隂陽而已兩者議之以要其中謹於諸家脈法中撮其機要翦去繁蕪載其精義浮脈之診浮於指下按之不足舉之有餘再再尋之狀如太過瞥瞥然見於皮毛間其主表證或為風或為虛浮而大散者心也浮而短澀者肺也浮而數者熱也浮數之脈應發熱其不發熱而反惡寒者瘡疽之謂也洪脈之診似浮而大按舉之則泛泛然滿三部其狀如水之洪流波之湧起其主虛實積熱瘡腫論曰脈洪大者瘡疽之病進也如瘡疽結膿未成者宜下之膿潰之後脈見洪大則難治若自利者不可救治也滑脈之診實大相兼往來流利如珠按之則纍纍然滑也其主或為熱或為虛此陽脈也瘡疽之病膿未潰者宜內消也膿潰之後宜托裏也所謂始為熱而為虛也數脈之診按之則呼吸之間動及六至其狀似滑而數也若浮而數則表熱也沈而數則裏熱也又曰諸數為熱仲景曰脈數不時見則生惡瘡也又曰肺脈俱數則生瘡也診諸瘡洪數者裏欲有膿結也散脈之診似浮而散按之則散而欲去舉之則大而無力其主氣實而血虛有表無裏瘡腫膿潰之後而煩痛尚未痊退者診其脈洪滑粗散難治也以其正氣虛而邪氣實也又曰肢體沈重肺脈大則斃謂浮散者也芤脈之診似浮而軟按之中央空兩邊實其主血虛或為失血瘡腫之病診得芤脈膿潰後易治以其脈病相應也長脈之診按之則洪大而長出於本位其主陽氣有餘也傷寒得之欲汗出自解也長而緩者胃脈也百病皆愈謂之長則氣治也牢脈之診按之則實大而弦且沈且浮而有牢堅之意若瘰癧結腫診得牢脈者不可內消也實脈之診按舉有力而類結曰實經曰邪氣勝則實久病則虛人得此最忌瘡疽之人得此宜急下之以其邪氣與臟腑俱實故也弦脈之診按之則緊而弦其似緊者為弦如按弦而不移緊如內繩而轉動以此為異春脈浮弦而平不時見則為飲為痛主寒而虛瘡疽論曰弦洪相摶外緊內熱欲發瘡疽也緊脈之診似弦而緊按之如切繩而轉動其主切痛積癖也瘡腫得之氣血沈澀也亦主痛也澀脈之診按之則散而復來舉之則細而不足脈澀則氣澀也亦主血虛瘡腫潰後得之無妨也短脈之診按舉則不及本位內經曰短則氣病以其無胃氣也諸病脈短皆難治也瘡腫脈短真氣短也細脈之診按之則縈縈如蜘蛛之絲而欲絶舉之如無而似有細而微其主亡陽衰也瘡腫之病脈來細而沈時直者裏虛而欲變證也微脈之診按之則軟小而極微其主虛也真氣復者生邪氣勝者危瘡腫之病潰後脈微而勻舉自差也遲脈之診按舉來遲呼吸定息方得三至其狀似緩而稍遲痼疾得之則善新疾得之則正氣虛憊瘡腫得之潰後自痊緩脈之診按舉似遲而稍駛於遲仲景曰陽脈浮大而濡隂脈浮大而澀隂陽同等謂之緩脈見長緩百疾自瘳凡諸瘡腫潰後其脈澀遲緩者皆易愈以其脈候相應是有胃氣也沈脈之診舉之不足按之方見如爛綿其主邪氣在臟也水氣𫝊之則逆此隂脈也瘡腫得之邪氣深也伏脈之診比沈而伏舉之則無按之至骨方得與沈相類而邪氣益深矣虛脈之診按之不足遲大而軟輕舉指下豁然而空經曰脈虛則血虛血虛生寒陽氣不足也瘡腫脈虛宜托裏和氣養血也軟脈之診按之則如帛在水中極軟而沈細亦謂之濡其主胃氣弱瘡腫得之補虛排膿托裏弱脈之診似軟而極微來遲而似有仲景曰微弱之脈綿又如㵼漆之絶其主血氣俱虛形精不足大抵瘡家沈遲濡弱皆宜托裏促脈之診按之則去數來時一止而復來仲景曰陽盛則促主熱畜於裏也下之則和瘡腫脈促亦急下之結脈之診按之則往來遲緩時一止而復來仲景曰隂盛則結經曰促結則生代則死代脈之診按之則往來動則中止不能自還因而復動者曰代脈也代者氣衰也諸病見之不祥大凡瘡腫之病脈促結者難治而况見代脈乎動脈之診見於關上無頭尾如豆大厥厥然如動搖者是也脈經曰隂陽相搏故謂之動動於陽則陽氣虛而發厥動於隂則隂氣盛而發熱是陽生於尺而動於寸隂生於寸而動於尺不可不辨也論三部脈所主證候夫寸關尺者脈之位也浮沈滑澀者脈之體也奠位分體指文語證者診脈之要道也脈經曰大凡診候兩手三部脈滑而遲不浮不沈不長不短去來齊等者無病也寸口脈浮者傷風也緊者傷寒也弦者傷食也浮而緩者中風也浮而數者頭痛也浮而緊者膈上寒脅下冷飲也沈而緊者心下寒而積痛沈而弱者虛損也緩而遲者虛寒也微弱者血氣俱虛弦者頭痛心下有水也雙弦者兩脅下痛也偏絶者不遂也俱絶者不治也潎潎如羮上肥者陽氣微也連連如蜘蛛絲者陽氣衰也關主中焦胸腹中事去來徐而緩者無病也浮者腹滿而不欲食胃虛脹也滑者客熱在胃也數者熱結中焦也沈伏者中焦水氣或嘔逆而吞酸弱者胃氣虛也雖有虛熱不可大攻須防熱去則生寒也牢而實者腹滿嚮嚮噎塞而不通或復大痛澀者氣逆也芤則㵼血澀堅太實按之不減而有力者中焦實有結伏在胃也微浮者積熱不消蛔動心悸也尺主下焦腰腎膝脛足中事也尺脈浮者風熱小便難也沈者腰背痛而腎氣不足數者臍下熱痛小便赤色而惡寒也逆者下焦寒而隂虛也緊者臍下小腹急痛也緩者腳弱下腫而痿痺也弱者下冷而腎氣衰也軟者腳不收而風痺小便難也伏者小腹痛而疝瘕穀不化也細者溏泄而下冷也芤者小便澀血而下虛也牢而小者足膝寒痺腳下隱隱疼痛也細而急者筋攣不能行也來而斷絶者男子小腹有滯氣也婦人月水不利也論三部脈所主雜病法訣夫三部之中俱見一脈所主雜病略而言之脈經曰陽邪來見浮洪隂邪來見微細水穀之邪來見實堅寒癖之邪來見弦小又曰浮而滑者宿食也短而滑者酒病也遲而滑者脹滿也洪而大者傷寒也浮而數者傷風也浮而急者飲食不消脾不磨也沈而弦者寒氣結而隂痛也浮而緩者皮膚不仁也滑而散者癱瘓也遲而澀者寒厥也浮而澀者霍亂也弱而澀者反胃也緊而滑者吐逆也短而數者心痛也弦而數者為瘧也緊而急者尸遁也實小而堅者病在內而冷也浮滑而緊者病在外而熱也短而急者病在上也長而緩者病在下也長而弦者病在肝也滑而洪者病在心也微而軟者病在脾也浮而澀者病在肺也沈而緊者病在腎也又訣曰諸浮為風或為虛也諸緊為痛或為積也諸澀為痺諸弦為飲諸數為熱諸遲為寒芤則為失血軟則為虛若脈沈沈澤澤四肢不仁者亡祟也或大而愵愵者社祟也若脈來乍大乍小乍短乍長者鬼祟也論診候肺疽肺痿法夫肺者五臟之華蓋也處於胸中主於氣候於皮毛勞傷血氣腠理虛而風邪乘之內感於肺也則汗出惡風咳嗽短氣鼻塞項强胸脅脹滿久久不瘥已成肺痿也風中於衛呼氣不入熱至於榮則吸而不出所以風傷皮毛熱傷血脈風熱相搏氣血稽留藴結於肺變成瘡疽診其脈候寸口脈數而虛者肺痿也數而實者肺疽也肺痿之候久嗽不已汗出過度重亡津液便如爛瓜下如豕脂小便數而不渴渴者自愈欲飲者欲瘥此由肺多唾涎沫而無膿者肺痿也其肺瘡之候口乾喘滿咽燥而渴甚則四肢微腫咳唾膿血或腥臭濁味胸中隱隱微痛者肺疽也又聖惠曰中府隱隱而微痛者肺疽也上肉微起者肺瘡也中府者穴也在雲門下一寸六分乳肋間動脈應手陷中也是以候始萌則可救膿成則多死若欲知有膿者但診其脈若微緊而數者未有膿也緊甚而數者已有膿也又內經曰血熱則肉敗榮衛不行必將為膿大凡肺瘡肺疽當咳嗽短氣胸滿時唾膿血久久如粳米粥者難治若嘔膿而不止者亦不可治也其嘔膿而自止者自愈其脈短而澀者自痊浮大者難治其面色當白而反面赤者此火之尅金皆不可治論將護忌慎法大凡有瘡疽生皆只如黍粟粒許大其狀至微人多不以為急此藴大患宜速辨之不可自忽若能防之於未形理之於未成或朝覺而夕治求治於良醫則必無危困矣若因循慢忽詢於庸醫致令膿血結聚委之於命束手待斃不以去道逺乎以致筋骨敗遺穿通臟腑死者十有八九矣可不慎歟蓋患瘡疽之人托命庸醫任意措置危殆立至若用良醫則可保痊愈用醫之際不可不擇辨之何難若能飽讀經書久諳證候湯藥熟間洞明色脈性情仁善孝義忠信臨事不惑處治有決方為良醫委用勿疑然後要在病人自克不可恚怒悲憂呌呼忿恨驕恣情性信任口腹馳騁勞役惟宜清靜恬淡耐煩為宜於患人左右止息煩雜切忌打觸器物諸惡音聲爭辨是非呪罵鬭毆及産婦淫男體氣不潔帶酒腥羶雞犬乳兒孶畜禽獸並須逺離設或親友重意問疾者可以預囑徐行低聲款曲伺候禮畢躬退勿令嗟呀驚怪話舊引其遊賞宴樂逺别親戚牽惹情懷但恐病人心緒悽愴尤不可亂舉方藥徒論虛實惑亂患人凝滯不決祇合方便省問不可久坐多言勞倦病人深不長便夫侍患者宜須壽近中年情性沈厚勤謹耐煩仁慈智惠全在調以粥藥無失時節勿令於患人左右彈指嗟咨掩淚竊言感激病人甚不利便飲食之間忌慎非細不可不載畜中勿食驢馬駝騾猪狗牛羖羊等并雜魚龜鱉蝦蟹及淹浥臭味自死病倒之類慎勿嘗啖飛禽之中忌食鵝鴨鴻鷹雀鶴鴛鴦鷺鷥鳩鴿鴉雞雉及能學人言者慎勿食之野獸之中忌食獐鹿狐兔虎豹熊豺及爪牙害人有毒蟲獸并父母自本命生屬忌慎勿嘗啖菜蔬之中忌食黃瓜茄子蘭香藝薹胡荽生菜蓼芥菌瓠韭蒜葱薤慎勿食之果木之中忌食桃杏棗栗李奈梨梅軟棗紅柿櫻桃胡桃榛松林檎及諸蟲蚛未熟之果慎勿食之若其瘡疽膿潰腫消氣血虛弱則可食羊肉鵪鶉蔓菁薑醬瓜薺蘿蔔及黃白糧米細米稀粥軟飯至若肌肉漸生思想滋味則宜食白熟酥餅薺粥羮湯熟軟溫和稀稠得中製造如法勿令太飽此時尤忌饅頭蒸餅餺飩飩餛肉脯煎餅及炙􅏼煏􅯢煎炒鹹酸油膩脂肥魚肉若至肌膚欲平惡肉去盡瘡口收斂之際尚忌起立行步揖待賓客房酒宴㑹嗔怒沐浴登陟臺榭運動肢體寒暑勞倦正宜調節飲食保攝以待瘡瘢平復精神如故氣力完全方無所忌百日內慎勿觸犯之論瘡疽腫虛實法夫瘡疽膿潰腫毒浸展證候危惡者須辨虛實况夫虛者難補實者易㵼補㵼之法不可輕用若或少差利害甚大然而虛實證多端不可不辨有瘡之虛實有臟腑氣血上下真邪各有虛實故不同也分而言之則腫起堅硬膿稠者瘡疽之實也腫起外軟膿稀者瘡疽之虛也㵼痢腸鳴飲食不入嘔吐無時手足並冷脈弱皮寒小便自利或小便時難大便滑利聲音不出精神不爽者悉臟腑之虛也大便硬小便澀飲食如故腸滿膨脹胸膈痞悶肢節疼痛口苦咽乾煩燥多渴身熱脈大精神昏塞者悉臟腑之實也凡諸瘡疽膿水清稀瘡口不合聚腫不赤肌寒肉冷自汗色脫者氣血之虛也腫起色赤寒熱疼痛皮膚壯熱膿水稠粘頭目昏重者氣血之實也頭疼鼻塞目赤心驚咽喉不利口舌生瘡煩渴飲冷睡語咬牙者上實也精滑不滯大便自利腰腳沈重睡卧而不寧者下虛也肩項不便四肢沈重目視不正晴不了了食不知味音嘶色敗四肢浮腫者真氣之虛也腫焮尤甚痛不可近積日不潰寒熱往來大便祕澀小便如淋心神煩悶恍惚不寧者邪氣之實也又曰真氣奪則虛邪氣勝則實又曰諸痛為實癢為虛也又曰診其脈洪大而數者實也微細而軟者虛也虛則補之和其氣托裏也實則㵼之疏利而自導其氣內經謂血實則決之氣虛則掣引之辨瘡腫淺深法夫瘡候多端欲辨淺深直須得法若不素知方論而妄生穿鑿者如大匠舍其繩墨以意度量安能中於規矩哉嘗聞古人有言曰多則惑少則得簡而論之則瘡疽槩舉有三種髙而軟者發於血脈腫下而堅者發於筋骨肉皮色不相辨者發於骨髓又曰凡療瘡疽以手按搖瘡腫根牢而大者深也根小而浮者淺也又驗其人初生瘡之時便覺壯熱惡寒拘急頭痛精神不寧煩躁飲冷者其患瘡疽必深也若人雖患瘡疽起居平和飲食如故其疾浮淺也惡瘡初生其頭如米粟微似有痛癢設觸破之即焮展覺有深意速服犀角湯通氣丸等取通利疏暢兼用浴毒湯溻漬之類若浮淺者縱貼膏求差以此推之淺深之辨始終之次者也辨膿法夫瘡腫之疾毒氣已結者不可論內消之法即當辨膿生熟淺深不可妄開視其可否不至於危殆矣凡瘡疽腫大按之乃痛者膿深也小按之便痛者膿淺也按之不甚痛者未成膿也若按之即復者有膿也不復者無膿也非也必是水也若發腫都軟而不痛者血瘤也發腫日漸增長而不大熱時時牽痛者氣瘤也氣結微腫久而不消後亦成膿此是寒熱所為也留積經久極隂生陽寒化為熱以此潰必多成瘻宜早服內塞散以排之諸癃瘤疣贅等至年衰皆自內潰理於年壯可無後憂也又凡療癰疽以手掩其上大熱者膿成自軟也若其上薄皮剝起者膿淺也其腫不甚熱者膿未成也若患瘰癧結核寒熱發渴經久不消者其人面色痿黃被熱上蒸已成膿也至於臟腑腸胃內瘡內疽其疾隱而不見目既不見手不能近所為至難可以診其脈而辨之亦可知矣有患胃脘癰者當候胃脈人迎者胃脈也其脈沈細者氣逆則甚甚則熱聚胃口而不行胃脘而為癰也若其脈洪數者膿已成也設脈遲緊雖膿未就已有瘀血也宜急治之不爾則邪毒內攻腐爛腸胃不可救也又肺癰論曰始萌則可救膿成即死不可不慎也久久咳膿如粳米粥者不治嘔膿而止者自愈也又腸癰論曰或繞臍生瘡膿從瘡出者有出臍中者惟大便下膿血者自愈也辨瘡疽癤腫證候法夫瘡疽癤腫其名甚多載之紛紜方書百緒及至臨疾治之無據不知所以內經曰知其要者一言而終不知其要者流散無窮愚雖不才姑揣其要而言之熱發於皮膚之間是以浮腫根小至大不過二三寸者癤也六腑積熱騰出於外肌肉之間其發暴甚腫皮光軟侵展廣大者癰也五臟風積熱攻焮於肌骨風毒猛暴初生一頭如㾦㿔白焦枯觸之應心者疽也夫癰瘡發於六腑若燎原之火外潰膚肉疽生五臟沈澀難療若陶室之燧內消骨髓癰則易療惟難將息而遲瘥疽則難療易得痊復夫癤與瘡初生並宜灸之謂其氣本浮達以導其熱令速暢也疽則烙不宜灸謂其氣本深沈須達其原也凡瘡疽生於外皆由熱毒藴於內明乎三者腫毒丹疹可以類推矣蓋皮膚微髙起而肌厚或痛或癢移走無常者謂之腫有因思而得之者有因風熱相摶而得之者腫硬色白因熱而得之者腫焮色赤因風熱相摶而得之者久久而不消熱勝於風若不即治血不流通與氣乘之以成膿也又曰風多則癢熱多則痛此為驗也又有丹毒者謂人身忽然變赤如塗丹之狀故謂之丹毒世俗有云赤瘤或因有瘡誤而相觸四畔焮赤論之瘡瘤凡丹瘤之疾皆遊走不定狀如雲氣者是也小兒得之最忌百日之內謂之胎瘤以其氣血嫩弱臟腑柔脆難任鎌針所以忌也又頸腋之間而生結核初如豆粒或如梅李核纍纍相連歷歷三五枚久久不消以漸長大或發寒熱者謂之瘰􅐇有風毒者得之於風熱毒者得之於熱氣毒者得之於氣悉由風熱邪氣藴經所成證候不同治之者亦各異矣辨瘡疽善惡法夫瘡疽證候善惡逆從不可不辨從來醫瘡槩舉五善七惡殊不知此特謂腸胃之內臟腑瘡疽所論之證也發背腦疽别有善惡之證載之於後蓋七惡者煩躁時嗽腹痛渴甚或泄痢無度或小便如淋者一惡也膿血既泄腫焮尤甚膿色敗臭痛不可近二惡也目視不正黑睛緊小白睛青赤瞳子上看三惡也喘粗短氣恍惚嗜卧四惡也肩背不便四肢沈重五惡也不能下食服藥而嘔食不知味六惡也聲嘶色敗唇鼻青赤面目四肢浮腫者七惡也動息自寧飲食知味一善也便利調勻二善也膿潰腫消水鮮不臭三善也神彩精明語聲清亮四善也體氣平和五善也病有證合七惡皮急緊而如善者病有證合五善而皮緩虛如惡者夫如是者豈淺識之所知哉只知五善併至則善無以加矣七惡併至見惡之極矣愚意裁之凡患瘡疽之時五善之中乍見一二善證瘡亦回也七惡之內忽見一二惡證宜深懼之大抵證候瘡疽之發虛中見惡證者不可救也實證無惡候者自愈大凡膿潰之後而煩疼尚未痊者診其脈洪滑粗散者難痊微澀遲緩者易痊此善惡之證於診候之中亦可知也發背腦疽及諸惡瘡别有五逆之證者白睛青黑而眼小服藥而嘔傷痛渴甚膊項中不便音嘶色敗者是為五逆其餘熱渴痢嘔蓋毒氣入裏臟腑之傷也當隨證以治之砭鎌法夫上古制砭石大小者隨病所宜也內經謂針石砭石鑱針其實一也今時用鎌者從聖濟總録丹毒論曰法用鎌割出血明不可緩也合扁鵲云病在血脈者治之以砭石此舉素問血實宜決之又氣血形志論曰形樂志樂病生於內治之砭石蓋砭石者亦東方來為其東方之民其病多瘡瘍其法宜砭石砭石之用目有證候非止丹瘤也但見腫起色赤不定宜急鎌之先以生油塗赤上以鎌鎌之要在決泄其毒然而此法不可輕用忌其太深內經所謂刺皮無傷肉以其九針之用而各有所宜也砭鎌之法雖治瘡疽不可輕用也貼熁法夫瘡腫之生於外者由熱毒之氣藴結於內也蓋腫於外有生頭者有皮厚者有皮薄者有毒氣深者有毒氣淺者有宜用濕藥貼熁者有宜用凉藥貼熁者有可以乾換其藥者有可以濕換其藥者深淺不同用藥亦異是以不可不辨也若瘡腫初生似有頭者即當貼溫熱藥引出其熱毒火就燥之義也於四畔赤焮處搗生寒藥貼熁之折伏其熱勢驅逐其邪惡撲火之義也夫生寒藥勢氣力精全性味雄健或有療者不本物理皆通用藥草膏之類有勢力微欲使尫瘠者敵其勇夫不亦難乎又有粗工不審逆從便用寒藥敷貼趂逐邪毒復入於內歸於肝心十死八九矣大抵敷貼之法欲消散腫毒血脈疏通寒熱逆從斷其去就焉慎不可執方無權安能散於鬱結不成膿乎其腫皮厚者以故軟布或以紙花子塗藥貼熁之待其藥乾換腫皮薄者即用疏紗或薄紙塗藥貼熁之其藥未乾即當換之至若膿潰之後即貼溫肌生肉膏藥要在逐臭腐排惡汁取死肌生良肉全藉溫熱膏劑之力也切勿用寒凉之藥水調貼之夫血脈喜溫而惡寒若著冷氣過理即血滯難瘥矣溻漬瘡腫法夫溻漬瘡腫之法宣通行表發散邪氣使瘡內消也蓋湯水有蕩滌之功古人有論瘡腫初生經一二日不退即須用湯水淋射之其在四肢者溻漬之其在腰腹背者淋射之其在下部委曲者浴漬之此謂疏導腠理通調血脈使無凝滯也且如藥二兩用水二升為則煎取一升半以淨帛或新綿蘸藥水稍熱溻其患處漸漸喜溻淋浴之稍凉則急令再換慎勿冷用夫血氣得寒則凝澀得熱則淖澤日用五七次病甚者日夜不住或十數次腫消痛止為驗此治瘡腫神良之法也針烙瘡腫法夫瘡疽之疾證候不一針烙之法實非小端蓋有淺有深有遲有速宜與不宜不可不辨蓋疽腫皮厚口小腫多膿水出不快者宜用針烙癤皮薄惟用針以決其膿血不可烙也如其未成膿已前不可以諸藥貼熁溻漬救療以待自消久久不消內潰成膿即當棄藥從其針烙當用火針如似火筯磨令頭尖如棗核樣圓滑用燈焰燒須㬰作熱數揾油燒令赤於瘡頭近下烙之一烙不透即須再烙令透要在膿水易出不假按抑近代良醫倉卒之際但以金銀鐵鋌其樣如針者可通用之實在泄其毒也或只以木炭熟火猛燒通赤蘸油烙之尤妙烙後實者撚髮為絍虛者以紙為絍於絍上蘸藥絍之上以帛攤溫熱軟粘膏藥貼之常令滋潤勿令燥也夫瘡疽既作毒熱聚攻蝕其膏膜肌肉腐爛若不針烙毒氣無從而解膿淤無從而泄過時不烙反攻其內內既消敗欲望其生豈可得乎嗟乎此疾針烙取差實為當理然忌太早亦忌稍遲嘗見粗工不審其證淺深妄施針烙之法或瘡深針淺烙毒氣不得泄以致內潰或瘡淺烙深誤傷良肉筋骨腐爛或抑擦掀動加益煩痛或針之不當别處作頭或即時無膿經久方潰遂使痛中加痛真氣轉傷詳其所由不遇良醫也以此推之凡用醫者不可不擇縱常醫療之得痊者幸矣灸療瘡腫法夫疽則宜灸不宜烙癰則宜烙不宜灸丹瘤腫毒宜溻漬之腫皮光軟則針開之以泄其毒治瘡之手法逮不過此而各有所宜故聖惠方論曰認是疽瘡便宜灸之一二百壯如菉豆許大灸後覺似焮痛經一宿乃是火氣下徹腫內熱氣被火導之隨火而出所以然也若其瘡癢宜隔豉餅子灸之其餅須以椒薑鹽葱相和爛搗揑作餅子厚薄如折三錢以來當瘡頭豉餅子上灸之若覺太熱即擡起又安其上餅子若乾更換新者尤佳若其瘡痛即須急灸壯數多為妙若其膿已成者慎不可灸即便針開之即得瘥也若諸瘡經久不瘥變成瘻者宜用硫黃灸法灸之其法硫黃一塊可瘡口大小安之别取少許硫黃於火上燒用針尖挑起㸃硫黃令著三五遍取膿水乾差為度若其發背初生即宜土餅灸法灸之初覺背上有瘡疼癢頗異認是發背即取淨土水和捻作餅子徑一寸厚二分貼著瘡上以艾作炷灸之一炷一易餅子其瘡粟米大時可灸七七炷其瘡如錢許大日夜不住灸以瘥為度已上數法並依本方一一親驗所以載之愚謂瘡醫自幼至老凡所經驗必須寫之嘗記疳瘻惡瘡諸醫不驗者取蠐螬剪去兩頭安瘡口上以艾灸之七炷一易不過七枚無不效者又法用乞火婆蟲灸之同前法纍驗之神效人皆祕之往往父子不傳人法赤皮蒜搗爛焊作餅子一如豆豉餅子灸法灸之彌佳內消法夫瘡疽丹腫之生皆內隂陽不調榮衛凝澀氣血不流之所生也古人有言曰陽滯於隂則生瘡隂滯於陽則生疽瘡疽之生有內有外內生於臟腑胸腹之中外則生于膚肉筋骨之表發無定處夫鬱滯之本則因氣血不流蒸氣不能外達留滯而成內熱瘡疽所生焉若初覺氣血鬱滯皮肉結聚腫而未潰特可疏滌風熱通利臟腑一二行徐次諸陽得漬即得內消矣不然則治之稍慢毒熱不散反攻其內致令膿肉之聚也內經謂治病必求於本蓋瘡疽本乎中熱之鬱結不通也其風邪寒氣所聚也治之宜溫熱之劑和血分內消也辨之有法須認風寒則腫硬色白熱毒則焮腫色赤以為異也如其氣已結聚不可論內消之法宜用排膿托裏之藥此實先後之次也追蝕瘡疽腫法夫瘡瘍生於外皆由積熱藴於內內經謂血熱肉敗榮衛不行必將為膿留於節腠必將為敗蓋瘡疽膿潰爛之時頭小未破瘡口未開或毒氣不出疼痛難任者所以立追蝕膿之方法使毒氣外泄而不內攻惡肉易去好肉易生也若其瘡絍其血出不止者則未可絍於瘡上摻追蝕之藥待其熟可絍方絍若其瘡絍之痛應心根者亦不可以强絍之誤觸其瘡其焮痛必倍變證不無不可不慎也若瘡癤膿成未破於上薄皮剝起者即當用破頭代針之劑安其上以膏貼之膿出之後用搜膿化毒之藥取效如神矣若膿血未盡便用生肌斂瘡之劑務其早愈殊不知惡肉未盡其瘡早合後必再發不可不慎也托裏法夫瘡疽丹腫結核瘰癧初覺有之即用內消之法經久不除氣血漸衰肌寒肉冷膿汁清稀毒氣不出瘡口不合成聚腫不赤結核無膿外證不明者並宜托裏膿未成者使膿早成膿已潰者使新肉早生血氣虛者托裏補之隂陽不和托裏調之大抵托裏之法使瘡無變壞之證凡為瘡醫不可一日無托裏之藥然而寒熱溫凉煩渴利嘔臨證宜審其緩急耳止痛法夫瘡疽之證候不同寒熱虛實皆能為痛止痛之法殊非一端世人皆謂乳沒珍貴之藥可住疼痛殊不知臨病制宜自有方法蓋熱毒之痛者以寒凉之劑折其熱則痛自止也寒邪之痛以溫熱之藥尉其寒則痛自除矣因風而有痛者除其風因濕而痛者導其濕燥而痛者潤之塞而痛者通之虛而痛者補之實而痛者㵼之因膿鬱而閉者開之惡肉便潰者引之隂陽不和者調之經絡祕澀者利之臨機應變方為上醫不可執方而無權也用藥增損法古人用藥因病制宜治不執方隨病增損療積聚補益可用丸藥以從舊不改方增損蓋瘡疽危要之際證候多種安有執方之論固可臨時加減以從其法只如發背腦疽惡丁腫膿潰前後虛而頭痛者於托裏藥內加五味子恍惚不寧加人參茯苓虛而發熱者加地黃栝蔞根往來寒熱者并潮熱者加柴胡地骨皮渴不止者加知母赤小豆大便不通者加大黃芒硝小便不通者加木通燈草虛煩者加枸把子天門冬自利者加厚朴四肢厥逆者加附子生薑嘔逆者加丁耆藿香多痰者加半夏并陳皮膿多者加當歸川芎痛甚者加芍藥乳香肌肉遲生者加白斂官桂有風邪者加獨活防風心驚怯者加丹砂口目瞤動者加羌活細辛愚雖不才自幼及老凡治瘡疽常依此法加減用藥取效如神後之學者宜細詳焉療瘡腫權變通類法夫瘡疽之病治療多方總而論之各有所宜補㵼淋溻及敷掃貼熁針鎌灸烙用之不同蓋知其道也舉治必效昧於理者利害不無嘗見以寒療熱以熱療寒古今之通論也又有檢方療病妄製加減以意裁之自以為可殊不知病有從逆治有緩急法有正權方有竒偶用有輕重夫醫者意也得其意然後能變通也達其變通者悟其為而省其理也則左右逢其源矣愚雖不才略陳萬一嘗見治寒以熱而寒彌甚治熱以寒而熱彌熾者何也蓋不知五臟有隂陽之性其可因其類而取之也假如心實生熱者當益其腎腎水滋熱將自除腎水虛生寒當補心心火既降寒將自除此所謂寒之而熱者取之隂熱之而寒者取之陽也又寒因熱用熱因寒用要在通其理類而已又聞微者逆之甚者從之何謂也蓋治寒以熱必凉而行之治熱以寒必溫而行之此亦欲其調和也其間有正有權者何也蓋病有微有甚微者逆治理之正也甚者從治理之權也然為瘡科於補㵼汗下標本逆從正權之理烏可闕而不知也大凡治療瘡疽之要法曰初覺熱毒發熱鬱結而作瘡一二日宜先服五利湯蕩滌邪氣疏通臟腑令內消也古今湯法謂切銼㕮咀如麻豆大以猛火急煎無令過熟欲其速利也次有丸散宣導血脈漸次消磨令緩散也助以淋溻調和榮衛行經絡也更當膏潤溫養兼磨傅四畔貼熁之藥順其隂陽也追蝕托裏汗下調補臨時制宜淺深緩急自有等差男女貴賤亦當别論晉尚書禇澄曰寡婦尼僧異於妻妾雖無房室之勞而有憂思之苦此深達其情者也又仲景云物性剛柔餐居亦異治亦不同也所以黃帝興四方之問岐伯舉四治之能况病之新舊形志樂苦豈可執方無權以求其愈疾哉亦有瘡疽腫痛初生一二日便覺脈沈細而煩悶臟腑弱而皮寒邪毒猛暴恍惚不寧外證深沈者亦宜即當用托裏散或增損茯苓湯及溫熱之劑以從治之論五發疽夫五發者謂癰疽生於腦背眉髯鬢是也大槩論之分為三等一者疽也二者癰也三者癤也夫疽初生如粟米大癢痛有異誤觸破之即焮展四畔赤腫沈悶牽引脅肋疼痛數日之後漸覺肌膚壯熱惡寒煩渴腫暈侵展􅀈漿汁出積日不潰抑之則流血者謂之發背疽也其發於腦者為腦疽也其發於鬢眉髯者以類呼也又有初生其狀無頭腫濶三四寸始覺注悶疼痛因循數日皮光微軟者甚則亦令人發熱惡寒頭痛煩渴者謂之發背疽也又有初生一頭色浮赤而無根腫見於皮膚之間大小一二寸者癤也三者之候惟疽最重此疾初生皆曰滋味與厚衣衣服厚暖則表易招寒滋味過多則五臟生熱臟腑積熱則血脈不流而毒氣凝滯邪氣伏留熱摶於血血聚則肉潰成瘡淺則為癤實則為癰深則為疽矣亦有因服金石發動而患此疾者亦有平生不服金石藥而患此疾者蓋由上祖曽服餌者其毒氣流𫝊子孫此病初生認是疽則宜速療之若氣實之人急服五香連翹湯漏蘆湯若年幾未五十少壯實者可服五利大黃湯化毒丸取通利臟腑一二行瘡頭上用追毒散之類貼溫熱膏劑更溻腫湯潰毒湯淋溻之如此調治以待膿成已前不可以諸藥救療以安患人之心慎勿惱觸著至膿成敗潰宜服五香湯及內托裏散茯苓湯當歸托裏散之類渴不止者服竹葉黃茋湯乳香散勿為大熱服大黃􅮄硝苦寒之藥若因服利藥而利不止者死矣若瘡中惡肉未退膿水不快者即用追蝕之藥或鋌子絍之用鹿角散以醋熬為糊貼之惡肉退去好肉漸生即用搜膿散翠霞散之類絍之若瘡中毒氣未盡慎勿早斂忌早上生肌之藥縱得平復必再發其間調理次第臨時制宜將護忌慎之法耳論癰疽夫瘡腫之患莫大乎癰疽然而癰疽何以别之經所謂榮衛稽留於經脈之中則澀不行血脈不行則陽氣鬱遏而不通故生大熱熱毒之氣騰出於外蓄結為癰久而不散熱氣乘之腐化為膿然而骨髓不焦枯腑臟不傷敗可治而愈也何為疽五臟風毒積熱毒熱熾甚下陷肌膚骨髓皆枯血氣涸竭其腫色夭堅如牛領之皮故命曰癰疽者其腫皮薄以澤此其候也癰之生有內有外內生胸腹臟腑之中外生膚肉筋骨之表凡此二毒發無定處而有常名夫鬱滯之本始於喜怒哀樂不時飲食居處不節或金石草藥之發動寒暑燥濕之不調使隂陽之不平而藴結外使榮衛凝澀而腐潰輕者起於六腑浮達而為癰氣行經絡而浮也重者發於五臟沈澀而為疽氣行經絡而沉也明乎二者腫毒丹疹可以類推矣論附骨疽夫附骨疽者以其毒氣深沈附著於骨也此疾與賊風相類而不同人不能辨治之誤矣蓋附骨疽者由秋夏露卧為冷折之風熱伏結附骨成疽賊風之候由風邪之氣摶於骨節其痛深徹骨髓遇寒則痛甚附骨疽痛而不能轉初按之應骨皮肉微急洪洪如肥狀者是也其賊風皮骨不甚熱而索索惡寒時復汗出常欲熱尉痛處即得少寬其附骨疽初時但痛無時乍寒乍熱而無汗者經久不消極隂生陽寒化為熱而潰也賊風不治久而變為彎曲偏枯所以不同也認是賊風則服引越脾治風之劑即得差矣認是附骨疽急宜服漏蘆湯或五香連翹散疏下之次用內消升麻湯及溻漬膏貼之類縱不能消亦得浮淺及有緩疽石疽與附骨疽亦相類矣異者蓋緩疽石疽皆寒氣所作深伏於骨髓之間有腫與皮肉相似若疼而堅硬如石故謂之石疽緩疽其熱緩慢積日不潰久乃亦紫黯色皮肉俱爛故名曰緩疽此二者其治初覺便宜補虛托裏溫熱之劑以取消矣其次調治臨疾制宜故不復具載矣論隂瘡夫隂瘡者大槩有三等一者濕隂瘡二者妬精瘡三者隂蝕瘡又曰下疳瘡蓋濕瘡皆由腎經虛弱風濕相摶邪氣乘之瘙癢成瘡浸淫汗出狀如疥癬者是也妬精者由壯年精氣盈滿久曠房室隂上生瘡赤腫作臼妨悶癢痛者是也隂蝕瘡者由腎臟虛邪熱結下焦經絡痞澀氣血不行或房勞洗浴不潔以致生瘡隱忍不醫焮腫尤甚䄂瘡在裏措手無方疼痛注悶或小便如淋隂丸腫痛是也或經十數日潰爛血膿肌肉侵蝕或血出不止以成下疳若身體壯熱煩渴惡寒宜急治之以大豆甘草湯漬之漬毒湯等洗浴之服五香連翹湯等疏之更以截疳抵聖散乾糝之四畔用磨風膏溫潤之後以將護忌慎之渴不止者服竹葉黃茋湯大便軟者宜服托裏茯苓調治之夫如是則無不差矣論時毒夫時毒者為四時邪毒之氣而感之於人也其候發於鼻面耳項咽喉赤腫無頭或結核有根令人增寒發熱頭痛肢體痛甚者恍惚不寧咽喉閉塞人不識者將為傷寒便服解藥一二日腫氣增益方悟始召瘡醫原夫此疾古無方論世俗通為丹瘤病家惡言時毒切恐傳染考之於經曰人身忽經變赤狀如塗丹謂之丹毒此風熱惡毒所為謂之丹瘤與夫時毒特不同耳蓋時毒者感四時不正之氣初發狀如傷寒五七日之間乃能殺人治之宜精辨之先診其脈滑數浮洪沈緊弦澀皆其候也蓋浮數者邪氣在表也沈澀者邪氣深也認是時毒氣實之人急服化毒丹以攻之熱實以不利大黃湯下之其有表證者解毒升麻湯以發之或年髙氣軟者五香連翹湯主之又於鼻內㗜通氣散取十餘嚏作效若㗜藥不嚏者不可治之如嚏出一血者治之必愈如左右看病之人日日用㗜藥嚏之必不傳染切須忌之其病人每日用嚏藥三五次以泄熱毒此治時毒之良法也經三四日不解者不可大下猶宜和解之服犀角散連翹散之類至七八日大小便通利頭面腫起髙赤者可服托裏散黃茋散宜針鎌砭割出血泄其毒氣十日外不治自愈也此病若五七日已前精神昏亂咽喉閉塞語聲不出頭面不腫食不知味者必死之候活之無功矣然而此疾有隂有陽有可汗有可下嘗見一工但云熱毒只有寒藥殊不知病有微甚治有逆從不可不審矣論諸瘡夫諸瘡之生其類甚多種大小方書載之紛紛以要而論槩舉四等一者因於氣血稽留而結於內者謂腸胃之中癰疽是也二者因於氣血稽留而結於外者謂十丁九瘻五痔之類是也三者不因氣血而為瘡謂墮作并金刃湯火灸烙而傷皮肉之類是也四者不因氣血而骨肉損傷者謂蟲獸爪牙所害之類是也然而四者皆不難損於肌膚害於筋骨不必具載今於隨方條下該說治證以法附之為治之者臨疾制宜適事為故耳論丁瘡腫夫丁瘡者以其瘡形如丁蓋之狀者是也古方論之凡有十種華元化載之五色丁千金方說丁瘡有十三種以至外臺祕要神巧萬全其論頗同然皆不離於氣客於經絡五臟內藴毒熱初生一頭凹腫痛青黃赤黑無復定色便令煩躁悶亂或增寒頭痛或嘔吐心逆以針刺瘡不痛無血是其候也其候本因甘肥過度不慎房酒以致邪毒蓄結遂生丁瘡內經曰膏梁之實是生丁瘡此之謂也其治之法急於艾炷灸之若不覺痛者針丁四邊皆令血出以回瘡錠子從針孔絍之上用膏藥貼之仍服五香連翹湯漏蘆湯等疏下之為效若或針之不痛無血者以猛火燒鐡針通赤於瘡上烙之令如焦炭取痛為效亦絍前鋌子用膏藥貼之經一二日膿潰根出服托裏湯散依常療之以取平復如針不痛其人眼黑或見火光者不可治也此邪毒之氣入臟腑故也養生方云人汗入食肉食之則生丁瘡不可不慎也辨丁腫十三種形色禁忌凡療丁腫皆刺瘡心至痛處又刺四邊十餘下令血出去血傅藥藥力得入針孔中則佳若不達裏藥力不到又看口中頰邊舌上有赤黑如珠子者是也瘡上按之慘痛應心者是秋冬寒毒久結皮膚中變作此瘡不急療之日夜根長流入諸脈數道如箭入身顫掉不已若不慎口味房室死不旋踵經五六日不差眼中見火光心神昏昧口乾心煩嘔吐不定宜速治之一曰麻子丁其狀肉起頭如黍米色稍黑四邊微赤多癢忌食麻子油衣布衣并入麻田中行二曰石丁其狀皮肉相連色如黑豆甚硬刺之不入內微痛忌瓦礫磚石之屬三曰雄丁其狀皰頭黑靨四畔仰皰漿起有水出黃色太如錢孔形髙者忌房室四曰雌丁其狀瘡稍黃向裏靨亦似灸瘡曰面皰漿起心凹色赤如錢孔者忌房室五曰火丁其狀如湯火燒灼瘡頭黑靨四邊有煙漿又如赤粟米者忌火燒烙六曰􅀈丁其狀色稍黑有白班瘡中潰有膿水流出瘡形大小如匙面者忌沸熱食􅀈物七曰三十六丁其狀頭黑浮起形如黑豆四畔起赤色今日生一明日生二及至十若滿三十六藥所不能治未滿三十六可治忌嗔怒蓄積愁恨八曰蛇眼丁其狀瘡頭黑皮浮生形如小豆狀似蛇眼大體硬忌惡眼人看并嫉妬人見忌毒藥九曰鹽膚丁其狀大如匙面四邊皆赤有黑粟粒起食鹽大忌十曰水洗丁其狀大如錢形如錢孔瘡頭白裏黑靨汁出中硬忌飲漿水水洗渡河十一曰刀鎌丁其狀濶狹如薤葉大長一寸左側肉黑如燒烙忌刺及刀鎌切割鐡刃所傷可以藥治不可亂攻十二曰浮漚丁其狀瘡體曲圓少許不合長而狹如薤葉大內黃外黑黑處刺之不痛黃處刺之痛十三曰牛拘丁其狀肉色皰起掐不破右十三種丁瘡初起瘡心先癢後痛先寒後熱熱定則寒多四肢沈重心驚眼花若大重者則嘔逆嘔逆者難治其麻子丁一種始末惟癢初録忌者不得觸犯觸犯者發作難治療其浮漚丁牛拘丁兩種無所禁忌縱不療亦不能殺人其狀寒熱與諸丁不同皆宜將護依法治療禁忌勿得觸犯若或觸犯脊强瘡痛極甚不可忍者是也又云丁腫初發時突起如丁蓋故謂之丁令人惡心惡寒四肢强痛一日瘡變為焦黑色腫大光起根硬刺之不覺痛皆其候也在手足頭面胸背骨節間最急其餘處則可毒入腹則煩悶恍惚似醉如此者三二日死矣皆不可不速治也論瘰癧治法夫瘰癧之病其名甚多巢氏病源載之三十六種千金聖惠所論瘰癧九漏總論說有風毒熱毒氣毒之異瘰癧結核寒熱之殊其本皆由恚怒氣逆憂思過甚風熱邪氣內摶於肝蓋怒傷肝肝主筋故令筋蓄結而腫其候多生於頸腋之間結聚成核初如豆粒後若梅李核纍纍相連大小無定初覺增寒壯熱咽項强痛腫結不消者當便服五香連翹湯或牡蠣大黃湯疏下三兩行於上貼十香膏烏犀膏及用淋溻腫湯潰毒湯時復淋溻如此救療即得消散若未消散可服內消丸或皂角丸之類漸以求差若腫結深硬荏苒日月不能內消者久必成膿若腫髙而稍軟其人面色痿黃皮膚壯熱上蒸膿已成也可以針決核中令其潰散則易愈也治法如瘡法於瘡口中用追毒蝕肉錠子絍之於上用烏犀十香膏等貼之及托裏之劑和之經久不差或愈而復發或别處自穴膿水透出流津不止肌體羸瘦者變成九瘻內經曰陷脈為瘻留連肉腠即此病也可用蒜餅子灸之然後瘡口上用紫金散翠霞散等於上絍貼膏藥求差其將護忌慎治療用法無造次焉論痔夫痔瘻之候其名有五一曰牝痔二曰牡痔三曰氣痔四曰血痔五曰酒痔又曰腸風痔脈痔雌雄痔皆五痔之别名也其狀初生悉在肛邊或如鼠乳或結小核癢痛注悶甚者身熱惡寒諸方論之皆由房酒過度久嗜甘肥不慎醉飽以合隂陽勞擾血脈腸澼滲漏衝注下部肛邊生瘡變為痔疾治法始覺痔作便服通氣丸槐角丸熱實者服諸利湯疏利臟腑及浴洗重尉以取內消切忌酒麵辛熱房室肥膩稍縱嗜欲腐潰膿血或逗流淫汁嵗月已深旁穿竅穴即變痔漏即須用寸金錠子三五次痊愈若能味無味之味五味足矣事無事之事百事備矣其次服食調節謹慎合宜未有不差者外科精義卷上
